<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Display</title>
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
/* KEEP YOUR ORIGINAL STYLES (unchanged) */
:root {
    --bg:#121212;
    --text:#ffffff;
    --card:#1e1e1e;
    --accent:#ff9800;
    --poll:#2196F3;
}
body { background:var(--bg); color:var(--text); font-family:sans-serif; text-align:center; margin:0; }

.video-row {
    display:grid;
    grid-template-columns: 1fr 240px 1fr 60vw 1fr 240px 1fr;
    align-items:flex-start;
    justify-content:center;
    gap:20px;
    margin-top:20px;
}

.qr-panel {
    grid-column:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
}

.qr-panel-secondary {
    grid-column:6;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
}

.video-wrapper {
    grid-column:4;
    width:50vw;
    justify-self:center;
    position:relative;
}

video { width:100%; height:500px; object-fit:contain; background:black; }

.reaction-layer {
    position:absolute; top:0; left:0; width:100%; height:500px;
    pointer-events:none; overflow:hidden;
}

.floating-emoji {
    position:absolute; bottom:0; font-size:32px;
    animation: floatUp 5s ease-out forwards;
}
@keyframes floatUp {
    0% { transform:translateY(0); opacity:1; }
    100% { transform:translateY(-450px); opacity:0; }
}

.rating-row {
    width:50%;
    margin:15px auto 0 auto;
    display:flex;
    justify-content:space-between;
}

.results-container {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:40px;
    width:90%;
    margin:40px auto;
}

.results-container.poll-active {
    grid-template-columns: 1fr 1fr 1fr;
}

.results-column {
    background:var(--card);
    padding:15px;
    border-radius:10px;
}

.vote-bar-container, .poll-bar-container {
    background:#333; height:18px; border-radius:6px; overflow:hidden;
}

.vote-bar-fill { background:var(--accent); height:100%; }
.poll-bar-fill { background:var(--poll); height:100%; }

.leader-1 { color:gold; }
.leader-2 { color:silver; }
.leader-3 { color:#cd7f32; }

#qrText,
#qrText2 {
    margin-top:10px;   /* 🔥 space between QR and text */
    /*font-size:11px;
    word-break:break-all;*/
}
</style>
</head>

<body>

<h1 id="videoTitle">Loading...</h1>

<div class="video-row">
    <div class="qr-panel">
        <h3>Vote Here</h3>
        <div id="qrcode"></div>
        <div id="qrText"> </div>
    </div>
    
    <div class="video-wrapper">
        <video id="videoPlayer" autoplay controls playsinline></video>
        <div id="reactionContainer" class="reaction-layer"></div>
    </div>
    
    
    <div class="qr-panel-secondary" id="qr2Panel" style="display:none;">
        <h3>WiFi</h3>
        <div id="qrcode2"></div>
        <div id="qrText2"></div>
    </div>
</div>
<div class="rating-row">
    <div>
        <h2>Average Rating: <span id="avgRating">0.00</span></h2>
        <h3>Total Votes: <span id="voteCount">0</span></h3>
    </div>

    <div>
        🔥 Reactions: <span id="reactionCounter">0</span>
    </div>
</div>

<div class="results-container" id="resultsContainer">

<div class="results-column">
<h2>Vote Breakdown</h2>
<div id="distribution"></div>
</div>

<div class="results-column">
<h2>Top 7 Videos</h2>
<ol id="leaderboard"></ol>
</div>

<div class="results-column" id="pollColumn">
<div id="pollSection"></div>
</div>

</div>

<script>
const socket = io();

function cleanTitle(title){
    title = title.replace(/\.[^/.]+$/, ""); // remove extension
    return title.length > 40 ? title.substring(0,40) + "..." : title;
}

/* ---------- ELEMENTS ---------- */
const video = document.getElementById('videoPlayer');
const title = document.getElementById('videoTitle');
const avg = document.getElementById('avgRating');
const count = document.getElementById('voteCount');
const reactionCounter = document.getElementById('reactionCounter');
const distribution = document.getElementById('distribution');
const leaderboard = document.getElementById('leaderboard');
const reactionContainer = document.getElementById('reactionContainer');
const pollSection = document.getElementById('pollSection');
const resultsContainer = document.getElementById('resultsContainer');

let playlist = [];
let currentIndex = 0;

/* ---------- AUTO NEXT ---------- */
video.addEventListener('ended', () => {
    socket.emit('video_ended');
});

/* ---------- INIT ---------- */
async function init(){
    try {
        const vids = await fetch('/api/videos');
        playlist = await vids.json();

        if (!playlist.length) {
            title.innerText = "No videos found";
            return;
        }

        const cur = await fetch('/api/current');
        const data = await cur.json();

        playVideo(data.currentIndex || 0);
        updateLeaderboard();

    } catch (e) {
        console.error("INIT ERROR:", e);
        title.innerText = "Connection Error";
    }
}
/* ---------- Settings Sync ---------- */

socket.on('settings_update', (newSettings)=>{
    settings = newSettings;
});


async function loadSettings(){
    const res = await fetch('/api/settings');
    settings = await res.json();
}
loadSettings();
/* ---------- VIDEO ---------- */
function playVideo(i){
    if(!playlist[i]) return;

    currentIndex = i;
    const v = playlist[i];

    title.innerText = cleanTitle(v.title);

    video.src = v.file_path;
    video.load();
    video.play().catch(()=>{});

    updateDistribution(i);
}

socket.on('video_changed', playVideo);

/* ---------- VOTES ---------- */
socket.on('vote_update',(d)=>{
    if(d.video_id===currentIndex){
        avg.innerText=d.avg;
        count.innerText=d.count;
        updateDistribution(currentIndex);
    }
});

/* ---------- DISTRIBUTION ---------- */
async function updateDistribution(id){
    try{
        const res = await fetch(`/api/distribution/${id}`);
        const data = await res.json();

        const max = Math.max(...Object.values(data), 1);

        distribution.innerHTML="";

        for(let i=1;i<=5;i++){
            const c = data[i] || 0;
            const pct = (c / max) * 100;

            distribution.innerHTML += `
                <div>${i}⭐ (${c})</div>
                <div class="vote-bar-container">
                    <div class="vote-bar-fill" style="width:${pct}%"></div>
                </div>
            `;
        }

    } catch {}
}

/* ---------- LEADERBOARD ---------- */
async function updateLeaderboard(){
    try{
        const res = await fetch('/api/leaderboard');
        const data = await res.json();

        const top = data
            .filter(v => v.count > 0) // ❌ remove 0 vote videos
            .sort((a,b)=>b.avg-a.avg)
            .slice(0,7);

        leaderboard.innerHTML="";

        top.forEach((v,i)=>{

            let medal = i===0 ? "🥇 "
                      : i===1 ? "🥈 "
                      : i===2 ? "🥉 "
                      : "";

            const li = document.createElement('li');

            li.innerText = `${medal}${cleanTitle(v.title)} — ${v.avg.toFixed(2)} ⭐ (${v.count})`;

            if(i===0) li.classList.add("leader-1");
            if(i===1) li.classList.add("leader-2");
            if(i===2) li.classList.add("leader-3");

            leaderboard.appendChild(li);
        });

    } catch {}
}

socket.on('leaderboard_refresh', updateLeaderboard);

/* ---------- POLL ---------- */
socket.on('poll_started',(p)=>{
    resultsContainer.classList.add('poll-active');
    updatePoll(p);
});

socket.on('poll_update',updatePoll);

function updatePoll(p){

    let total = Object.values(p.counts).reduce((a,b)=>a+b,0);

    pollSection.innerHTML = `<h3>${p.question}</h3>`;

    p.options.forEach((opt,i)=>{

        const c = p.counts[i] || 0;
        const pct = total ? (c/total*100).toFixed(1) : 0;

        pollSection.innerHTML += `
            <div>${opt} (${c})</div>
            <div class="poll-bar-container">
                <div class="poll-bar-fill" style="width:${pct}%"></div>
            </div>
        `;
    });
}

socket.on('poll_cleared',()=>{
    pollSection.innerHTML="";
    resultsContainer.classList.remove('poll-active');
});

/* ---------- REACTIONS ---------- */
socket.on('new_reaction',(emoji)=>{
    const el=document.createElement('div');
    el.className='floating-emoji';
    el.innerText=emoji;
    el.style.left=Math.random()*90+"%";
    reactionContainer.appendChild(el);
    setTimeout(()=>el.remove(),5000);
});

socket.on('reaction_update',(n)=>{
    reactionCounter.innerText=n;
});
    
socket.on('qr_updated', (url)=>{
    generateQRCode();
});

socket.on('qr_secondary_updated', generateSecondaryQR);

/* ---------- QR ---------- */
async function generateQRCode(){

    let voteURL = `${window.location.origin}/vote.html`;

    try {
        const res = await fetch('/api/qr-url');
        const data = await res.json();

        if (data.url && data.url.trim() !== "") {
            voteURL = data.url;
        }

    } catch {}

    document.getElementById("qrcode").innerHTML = "";

    new QRCode(document.getElementById("qrcode"), {
        text: voteURL,
        width: 240,
        height: 240
    });

    document.getElementById("qrText").innerText = voteURL;
}

generateQRCode();

async function generateSecondaryQR(){

    try {
        const res = await fetch('/api/qr-secondary');
        const data = await res.json();

        const panel = document.getElementById("qr2Panel");

        if (!data.url || data.url.trim() === "") {
            panel.style.display = "none";
            return;
        }

        panel.style.display = "flex";

        document.getElementById("qrcode2").innerHTML = "";

        new QRCode(document.getElementById("qrcode2"), {
            text: data.url,
            width: 240,
            height: 240
        });

        document.getElementById("qrText2").innerText = data.url;

    } catch {}
}
generateSecondaryQR();

init();
</script>

</body>
</html>
