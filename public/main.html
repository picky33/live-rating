<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Display</title>
<script src="/socket.io/socket.io.js"></script>

<!-- QR Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root {
    --bg:#121212;
    --text:#ffffff;
    --card:#1e1e1e;
    --accent:#ff9800;
    --poll:#2196F3;
}

body {
    background:var(--bg);
    color:var(--text);
    font-family:sans-serif;
    text-align:center;
    margin:0;
}

/* VIDEO + QR ROW */
.video-row {
    display:grid;
    grid-template-columns: 1fr auto auto 1fr;
    align-items:flex-start;
    margin-top:20px;
}

/* QR PANEL */
.qr-panel {
    grid-column:2;
    margin-right:30px;  /* spacing between QR and video */
}

.qr-panel h3 {
    margin:0 0 10px 0;
}

#qrcode {
    margin:10px auto;
}

#qrText {
    font-size:11px;
    word-break:break-all;
}

/* VIDEO */
.video-wrapper {
    grid-column:3;
    width:50vw;              /* 🔥 true 50% of viewport */
    max-width:50vw;
    justify-self:center;
    position:relative;
}

video {
    width:100%;
    height:500px;
    object-fit:contain;
    background:black;
}

/* REACTIONS */
.reaction-layer {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:500px;
    pointer-events:none;
    overflow:hidden;
}

.floating-emoji {
    position:absolute;
    bottom:0;
    font-size:32px;
    animation: floatUp 5s ease-out forwards;
}

@keyframes floatUp {
    0% { transform:translateY(0); opacity:1; }
    100% { transform:translateY(-450px); opacity:0; }
}

/* RATING ROW */
.rating-row {
    width:50%;
    margin:15px auto 0 auto;
    display:flex;
    justify-content:space-between;
}

/* RESULTS GRID */
.results-container {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:40px;
    width:90%;
    margin:40px auto;
}

.results-container.poll-active {
    grid-template-columns: 1fr 1fr 1fr;
}

.results-column {
    background:var(--card);
    padding:15px;
    border-radius:10px;
}

#pollColumn { display:none; }
.results-container.poll-active #pollColumn { display:block; }

/* BARS */
.vote-bar-container,
.poll-bar-container {
    background:#333;
    height:18px;
    border-radius:6px;
    overflow:hidden;
}

.vote-bar-fill {
    background:var(--accent);
    height:100%;
    width:0%;
}

.poll-bar-fill {
    background:var(--poll);
    height:100%;
    width:0%;
}

/* LEADERBOARD */
.leader-1 { color:gold; font-weight:bold; }
.leader-2 { color:silver; font-weight:bold; }
.leader-3 { color:#cd7f32; font-weight:bold; }
</style>
</head>
<body>

<h1 id="videoTitle"></h1>

<div class="video-row">

    <!-- QR -->
    <div class="qr-panel">
        <h3>Vote Here</h3>
        <div id="qrcode"></div>
    </div>

    <!-- VIDEO -->
    <div class="video-wrapper">
        <video id="videoPlayer" autoplay controls playsinline></video>
        <div id="reactionContainer" class="reaction-layer"></div>
    </div>

</div>

<div class="rating-row">
    <div>
        <h2>Average Rating: <span id="avgRating">0.00</span></h2>
        <h3>Total Votes: <span id="voteCount">0</span></h3>
    </div>

    <div>
        🔥 Reactions: <span id="reactionCounter">0</span>
    </div>
</div>

<div class="results-container" id="resultsContainer">

<div class="results-column">
<h2>Vote Breakdown</h2>
<div id="distribution"></div>
</div>

<div class="results-column">
<h2>Top 7 Videos</h2>
<ol id="leaderboard"></ol>
</div>

<div class="results-column" id="pollColumn">
<div id="pollSection"></div>
</div>

</div>

<script>
const socket = io();

/* =========================
   SMART QR CODE
========================= */

async function generateQRCode(){

    let voteURL;

    try {
        const res = await fetch('/api/current');
        await res.json();

        // If we are on AWS (public IP), use this host
        const host = window.location.hostname;

        // Detect local vs AWS
        if (
            host === "localhost" ||
            host.startsWith("192.") ||
            host.startsWith("10.") ||
            host.startsWith("172.")
        ) {
            // LOCAL → fallback
            voteURL = `${window.location.origin}/vote.html`;
        } else {
            // AWS → use public host
            voteURL = `${window.location.origin}/vote.html`;
        }

    } catch {
        voteURL = `${window.location.origin}/vote.html`;
    }

    new QRCode(document.getElementById("qrcode"), {
        text: voteURL,
        width: 140,
        height: 140
    });

}

generateQRCode();

/* =========================
   EXISTING APP LOGIC
========================= */

const videoPlayer = document.getElementById('videoPlayer');
const videoTitle = document.getElementById('videoTitle');
const avgRating = document.getElementById('avgRating');
const voteCount = document.getElementById('voteCount');
const distribution = document.getElementById('distribution');
const leaderboard = document.getElementById('leaderboard');
const reactionContainer = document.getElementById('reactionContainer');
const reactionCounter = document.getElementById('reactionCounter');
const pollSection = document.getElementById('pollSection');
const resultsContainer = document.getElementById('resultsContainer');

let playlist = [];
let currentIndex = 0;

function cleanTitle(title){
    title = title.replace(/\.[^/.]+$/,"");
    return title.length > 40 ? title.substring(0,40)+"..." : title;
}

async function init(){
    playlist = await (await fetch('/api/videos')).json();
    const current = await (await fetch('/api/current')).json();

    if(current.currentVideo) playVideo(current.currentIndex);
    updateLeaderboard();
}

function playVideo(index){
    currentIndex = index;
    const video = playlist[index];

    videoTitle.innerText = cleanTitle(video.title);
    videoPlayer.src = video.file_path;
    videoPlayer.play();

    avgRating.innerText="0.00";
    voteCount.innerText="0";
}

socket.on('video_changed', playVideo);

socket.on('vote_update',(data)=>{
    if(data.video_id===currentIndex){
        avgRating.innerText=data.avg;
        voteCount.innerText=data.count;
    }
});

socket.on('leaderboard_refresh', updateLeaderboard);

async function updateLeaderboard(){
    const res = await fetch('/api/leaderboard');
    const data = await res.json();

    const top = data.filter(v=>v.avg>0)
        .sort((a,b)=>b.avg-a.avg)
        .slice(0,7);

    leaderboard.innerHTML="";
    top.forEach((v,i)=>{
        const li=document.createElement('li');

        let medal = i===0?"🥇 ":i===1?"🥈 ":i===2?"🥉 ":"";
        li.innerText=`${medal}${i+1}. ${cleanTitle(v.title)} — ${v.avg.toFixed(2)} ⭐ (${v.count})`;

        if(i===0) li.classList.add("leader-1");
        if(i===1) li.classList.add("leader-2");
        if(i===2) li.classList.add("leader-3");

        leaderboard.appendChild(li);
    });
}

socket.on('new_reaction',(emoji)=>{
    const el=document.createElement('div');
    el.className='floating-emoji';
    el.innerText=emoji;
    el.style.left=Math.random()*90+"%";
    reactionContainer.appendChild(el);
    setTimeout(()=>el.remove(),5000);
});

socket.on('reaction_update',(total)=>{
    reactionCounter.innerText=total;
});

init();
</script>

</body>
</html>
