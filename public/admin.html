<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<script src="/socket.io/socket.io.js"></script>

<style>
:root {
    --bg:#121212;
    --text:#ffffff;
    --card:#1e1e1e;
    --accent:#2196F3;
}

body {
    background:var(--bg);
    color:var(--text);
    font-family:sans-serif;
    text-align:center;
    margin:0;
}

button {
    padding:8px 14px;
    border:none;
    border-radius:6px;
    background:var(--accent);
    color:white;
    cursor:pointer;
}

input {
    padding:6px;
    border-radius:4px;
    border:1px solid #444;
    background:#1e1e1e;
    color:white;
}

table {
    width:80%;
    margin:30px auto;
    border-collapse:collapse;
    background:var(--card);
    border-radius:8px;
    overflow:hidden;
}

th,td {
    border:1px solid #333;
    padding:8px;
    text-align:center;
}

th { background:#1a1a1a; }

.current-row {
    background:#1e1e1e;
    color:#4CAF50;
    font-weight:bold;
}

/* AWS STATUS */
#awsStatus {
    margin:10px;
    font-size:18px;
}

/* Dashboard */
.dashboard {
    margin-top:10px;
    font-size:18px;
}
</style>
</head>
<body>

<h1>Admin Panel</h1>

<!-- AWS STATUS -->
<div id="awsStatus">
    AWS Connection: <span id="awsLed">🔴</span>
</div>

<!-- DASHBOARD -->
<div class="dashboard">
👥 Connected Users: <span id="userCount">0</span>
</div>

<hr>

<!-- VIDEO CONTROLS -->
<div>
<button onclick="previousVideo()">⏮ Previous</button>
<button onclick="nextVideo()">⏭ Next</button>
</div>

<div style="margin-top:10px;">
<label>
<input type="checkbox" id="shuffleToggle" checked onchange="toggleShuffle(this)">
Shuffle Playback
</label>
</div>

<div style="margin-top:20px;">
    <h3>QR Code URL</h3>
    <input id="qrInput" type="text" placeholder="https://your-aws-url/vote.html" style="width:300px;">
    <button onclick="saveQR()">Save</button>
</div>
<div style="margin-top:20px;">
    <h3>Secondary QR Code (WiFi / Custom)</h3>
    <input id="qr2Input" type="text" placeholder="Optional QR content">
    <button onclick="saveQR2()">Save</button>
</div>

<hr>

<!-- SETTINGS -->
<h2>Settings</h2>

<div>
Reaction Cooldown (seconds):
<input type="number" id="cooldownInput" value="10" min="0">
<button onclick="setCooldown()">Apply</button>
</div>

<br>

<div>
Single Vote Mode:
<button onclick="toggleVoteMode()" id="voteToggleBtn">Enabled</button>
</div>

<hr>

<!-- POLL -->
<h2>Send Live Question</h2>

<input type="text" id="pollQuestion" placeholder="Enter question" style="width:60%"><br><br>

<input type="text" id="opt1" placeholder="Option 1">
<input type="text" id="opt2" placeholder="Option 2">
<input type="text" id="opt3" placeholder="Option 3">
<input type="text" id="opt4" placeholder="Option 4"><br><br>

Vote Duration:
<input type="number" id="voteDuration" value="40">

Results Duration:
<input type="number" id="resultsDuration" value="30">

<button onclick="sendPoll()">Start Poll</button>

<hr>

<!-- VIDEO TABLE -->
<h2>All Videos</h2>

<table>
<thead>
<tr>
<th>Status</th>
<th>Title</th>
<th>Average</th>
<th>Votes</th>
</tr>
</thead>
<tbody id="videoTable"></tbody>
</table>

<script>
const socket = io();
let currentIndex = 0;

/* =========================
   AWS STATUS
========================= */

socket.on('aws_status', (online)=>{
    document.getElementById('awsLed').innerText = online ? "🟢" : "🔴";
});

/* Hide AWS indicator locally */
if (location.hostname === "localhost" || location.hostname.startsWith("192.")) {
    document.getElementById('awsStatus').style.display = "none";
}

/* =========================
   USER COUNT
========================= */

socket.on('user_count',(count)=>{
    document.getElementById('userCount').innerText = count;
});

/* =========================
   SETTINGS (FIXED)
========================= */

let singleVoteMode = true;

/* Load current settings */
async function loadSettings(){
    const res = await fetch('/api/settings');
    const data = await res.json();

    document.getElementById('cooldownInput').value = data.reactionCooldown || 0;

    singleVoteMode = data.singleVoteMode;

    document.getElementById('voteToggleBtn').innerText =
        singleVoteMode ? "Enabled" : "Disabled";
}

/* Apply cooldown */
function setCooldown(){
    const value = parseInt(document.getElementById('cooldownInput').value) || 0;

    socket.emit('admin_control', {
        action: "set_reaction_cooldown",
        value
    });
}

/* Toggle vote mode */
function toggleVoteMode(){

    singleVoteMode = !singleVoteMode;

    socket.emit('admin_control', {
        action: "toggle_single_vote",
        enabled: singleVoteMode
    });

    document.getElementById('voteToggleBtn').innerText =
        singleVoteMode ? "Enabled" : "Disabled";
}

/* Sync updates from server */
socket.on('settings_update', (s)=>{
    document.getElementById('cooldownInput').value = s.reactionCooldown;
    singleVoteMode = s.singleVoteMode;

    document.getElementById('voteToggleBtn').innerText =
        singleVoteMode ? "Enabled" : "Disabled";
});

/* Load on start */
loadSettings();

/* =========================
   VIDEO CONTROLS
========================= */

function nextVideo(){
    socket.emit('admin_control',{action:"next"});
}

function previousVideo(){
    socket.emit('admin_control',{action:"previous"});
}

function toggleShuffle(el){
    socket.emit('admin_control',{action:"shuffle",enabled:el.checked});
}


/* =========================
   POLL
========================= */

function sendPoll(){

    const question = document.getElementById('pollQuestion').value;

    const options = [
        opt1.value,
        opt2.value,
        opt3.value,
        opt4.value
    ].filter(o => o.trim() !== '');

    socket.emit('admin_control',{
        action:"start_poll",
        question,
        options,
        duration: parseInt(voteDuration.value)||60,
        resultsDuration: parseInt(resultsDuration.value)||30
    });
}

/* =========================
   VIDEO TABLE
========================= */

function cleanTitle(title){
    title = title.replace(/\.[^/.]+$/,"");
    return title.length > 40 ? title.substring(0,40)+"..." : title;
}

async function loadVideoTable(){

    const videos = await (await fetch('/api/videos')).json();
    const leaderboard = await (await fetch('/api/leaderboard')).json();
    const current = await (await fetch('/api/current')).json();

    currentIndex = current.currentIndex;

    const table = document.getElementById('videoTable');
    table.innerHTML="";

    videos.forEach(video=>{

        const stats = leaderboard.find(v=>v.id===video.id) || {avg:0,count:0};

        const row = document.createElement('tr');

        if(video.id === currentIndex){
            row.classList.add('current-row');
        }

        row.innerHTML=`
        <td>${video.id===currentIndex?'▶':''}</td>
        <td>${cleanTitle(video.title)}</td>
        <td>${stats.avg.toFixed(2)}</td>
        <td>${stats.count}</td>
        `;

        table.appendChild(row);
    });
}

socket.on('video_changed', loadVideoTable);
socket.on('leaderboard_refresh', loadVideoTable);

loadVideoTable();

async function loadQR(){
    const res = await fetch('/api/qr-url');
    const data = await res.json();
    document.getElementById('qrInput').value = data.url || "";
}

async function saveQR(){
    const url = document.getElementById('qrInput').value;

    await fetch('/api/qr-url', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ url })
    });
}

loadQR();

async function loadQR2(){
    const res = await fetch('/api/qr-secondary');
    const data = await res.json();
    document.getElementById('qr2Input').value = data.url || "";
}

async function saveQR2(){
    const url = document.getElementById('qr2Input').value;

    await fetch('/api/qr-secondary', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ url })
    });
}

loadQR2();
</script>

</body>
</html>
